<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>

<h2>Reset Password</h2>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="password"
           name="new_password"
           placeholder="New Password"
           required>

    <br><br>

    <button type="submit">
        Reset Password
    </button>

</form>

</body>
</html>
